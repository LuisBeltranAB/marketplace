[tool.poetry]
name = "marketplace-assistant"
version = "0.1.0"
description = "Decision support app for the Marketplace simulation (MVP)"
authors = ["Your Name <you@example.com>"]
packages = [{include = "marketplace_assistant"}]

[tool.poetry.dependencies]
python = "^3.12"
pandas = "^2.2"
duckdb = "^1.0"
streamlit = "^1.20"
